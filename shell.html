<!doctype html>
<html lang="en">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<link rel="shortcut icon" href="favicon.ico">
<meta name="theme-color" content="#ffffff">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Clicker Game (raylib)</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    canvas.emscripten {
      border: 0 none;
      background-color: black;
      /* Улучшает четкость пиксель-арта */
      image-rendering: -moz-crisp-edges;
      image-rendering: pixelated;
      width: 100vw;
      height: 75vw;
      max-height: 100vh;
      max-width: 133.33vh;
      outline: none;
    }

    #hiddenInput {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      opacity: 0;
      border: none;
      outline: none;
      z-index: -1;
    }
  </style>
</head>

<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  <!-- Скрытое поле для вызова клавиатуры на мобилках -->
  <input type="text" id="hiddenInput" autocomplete="off" autocapitalize="off" spellcheck="false">

  <script type='text/javascript'>
    const inputElement = document.getElementById('hiddenInput');
    const canvasElement = document.getElementById('canvas');

    var Module = {
      canvas: canvasElement,
      print: (text) => console.log(text),
      printErr: (text) => console.error(text)
    };

    canvasElement.addEventListener("mousedown", function (e) {
      setTimeout(() => canvasElement.focus(), 0);
    });

    canvasElement.addEventListener("touchstart", function (e) {
      inputElement.focus();
    }, false);

    function triggerKeyboard() {
      const input = document.getElementById('hiddenInput');
      input.value = '';
      input.focus();

      if (document.activeElement !== input) {
        setTimeout(() => input.focus(), 10);
      }
    }

    inputElement.addEventListener('input', (e) => {
      const data = e.data || inputElement.value;

      if (data && document.activeElement === inputElement) {
        for (let i = 0; i < data.length; i++) {
          canvasElement.dispatchEvent(new KeyboardEvent('keypress', {
            charCode: data.charCodeAt(i)
          }));
        }
      }
      inputElement.value = '';
    });

    inputElement.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        canvasElement.dispatchEvent(new KeyboardEvent('keydown', { key: 'Backspace', keyCode: 8 }));
      }
      // Если нажали Enter — тоже пробрасываем
      if (e.key === 'Enter') {
        canvasElement.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', keyCode: 13 }));
      }
    });
  </script>

  {{{ SCRIPT }}}
</body>

</html>
