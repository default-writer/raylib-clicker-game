<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Clicker Raylib Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        canvas.emscripten {
            border: 0 none;
            background-color: black;
            image-rendering: pixelated;
            width: 100vw;
            height: 75vw; 
            max-height: 100vh;
            max-width: 133.33vh;
        }
    </style>
</head>
<body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <script type='text/javascript'>
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("mousedown", function(e) { window.focus(); e.preventDefault(); }, false);
                return canvas;
            })(),
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
